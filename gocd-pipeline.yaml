format_version: 10

pipelines:
  github-ui-pipeline:
    group: defaultGroup

    materials:
      mygit:
        git: https://github.com/Rahul-3043/Go_Cd_Pipeline.git
        branch: main

    stages:
      - build:
          jobs:
            build-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - "ls && echo '--- File Content ---' && cat app.txt"
