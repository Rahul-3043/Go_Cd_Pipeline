format_version: 10

pipelines:
  github-ui-pipeline:
    group: defaultGroup
    materials:
      mygit:
        git: https://github.com/Rahul-3043/Go_Cd_Pipeline.git
        branch: main
    stages:
      - build:
          jobs:
            build-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - "ls && cat app.txt"

  complex-pipeline:
    group: defaultGroup
    materials:
      mygit:
        git: https://github.com/Rahul-3043/Go_Cd_Pipeline.git
        branch: main
    stages:
      - build:
          jobs:
            build-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        echo "===== BUILD STAGE ====="
                        echo "Simulating build..."
                        sleep 2
                        echo "Build completed"

      - test:
          jobs:
            test-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        echo "===== TEST STAGE ====="
                        if [ -f app.txt ]; then
                          echo "Test Passed"
                        else
                          echo "Test Failed"
                          exit 1
                        fi

      - package:
          jobs:
            package-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        echo "===== PACKAGE STAGE ====="
                        tar -czf app.tar.gz app.txt
                        echo "Artifact created"
