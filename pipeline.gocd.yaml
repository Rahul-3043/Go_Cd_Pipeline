format_version: 10

pipelines:

  full-ci-pipeline:
    group: defaultGroup
    materials:
      mygit:
        git: https://github.com/Rahul-3043/Go_Cd_Pipeline.git
        branch: main
    stages:
      - build:
          jobs:
            build-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - "ls && cat app.txt"

  python-pipeline:
    group: defaultGroup
    materials:
      mygit:
        git: https://github.com/Rahul-3043/Go_Cd_Pipeline.git
        branch: main
    stages:
      - python-build:
          jobs:
            python-job:
              resources:
                - python
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        echo "===== PYTHON PIPELINE ====="
                        python --version
                        echo "print('Hello from Python Agent')" > test.py
                        python test.py
