format_version: 10

pipelines:
  full-ci-pipeline:
    group: defaultGroup

    materials:
      mygit:
        git: https://github.com/Rahul-3043/Go_Cd_Pipeline.git
        branch: main

    stages:
      - build:
          jobs:
            build-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        echo "===== BUILD STAGE ====="
                        ls
                        echo "Build completed"

      - test:
          jobs:
            test-job:
              tasks:
                - exec:
                    command: bash
                    arguments:
                      - -c
                      - |
                        echo "===== TEST STAGE ====="
                        if [ -f app.txt ]; then
                          echo "Test Passed"
                        else
                          echo "Test Failed"
                          exit 1
                        fi
